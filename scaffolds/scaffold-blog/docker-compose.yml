version: '3.8'

services:
  blog:
    build: .
    container_name: ${CONTAINER_NAME:-engine-blog}
    restart: unless-stopped
    ports:
      - "${PORT:-8030}:8030"
    environment:
      - NODE_ENV=production
      - PORT=8030
      - DATABASE_URL=${DATABASE_URL}
      - JWT_SECRET=${JWT_SECRET}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - GOOGLE_API_KEY=${GOOGLE_API_KEY}
      - GEMINI_IMAGE_MODEL=${GEMINI_IMAGE_MODEL}
      - GEMINI_AVATAR_MODEL=${GEMINI_AVATAR_MODEL}
      - AWS_REGION=${AWS_REGION:-us-east-1}
      - AWS_ACCESS_KEY_ID=${AWS_ACCESS_KEY_ID}
      - AWS_SECRET_ACCESS_KEY=${AWS_SECRET_ACCESS_KEY}
      - S3_BUCKET=${S3_BUCKET}
      - SITE_NAME=${SITE_NAME:-Engine Blog}
      - SITE_DESCRIPTION=${SITE_DESCRIPTION:-A modern blog powered by AI}
      - SITE_URL=${SITE_URL:-http://localhost:8030}
    volumes:
      - ./uploads:/app/uploads
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8030/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

