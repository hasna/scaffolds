# Development services only (database and redis)
# Use this for local development while running the app with bun dev

services:
  postgres:
    image: postgres:16-alpine
    container_name: scaffold-postgres-dev
    restart: unless-stopped
    environment:
      POSTGRES_USER: scaffold
      POSTGRES_PASSWORD: scaffold_dev
      POSTGRES_DB: scaffold_saas
    ports:
      - "5432:5432"
    volumes:
      - postgres_dev_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U scaffold"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: scaffold-redis-dev
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_dev_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_dev_data:
  redis_dev_data:
